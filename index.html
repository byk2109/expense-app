<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>매일 지출 기록</title>
  <meta name="theme-color" content="#ffffff" />
  <style>
    :root {
      --bg: #f6f7f9;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #111827;
      --soft: #f3f4f6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", Segoe UI, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 16px 14px 40px;
    }
    h1 {
      font-size: 24px;
      margin: 8px 0 16px;
    }
    h2 {
      font-size: 18px;
      margin: 0 0 12px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.03);
    }
    .grid {
      display: grid;
      gap: 10px;
    }
    .grid-2 {
      grid-template-columns: 1fr 1fr;
    }
    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input, select, textarea, button {
      font: inherit;
    }
    input[type="number"], input[type="date"], textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 12px;
      padding: 12px 14px;
      outline: none;
    }
    textarea {
      min-height: 78px;
      resize: vertical;
    }
    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .chip {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      color: var(--text);
    }
    .chip.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .btn {
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      cursor: pointer;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      flex: 1;
      min-width: 120px;
    }
    .btn-secondary {
      background: var(--soft);
      color: var(--text);
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .stat {
      background: var(--soft);
      border-radius: 14px;
      padding: 12px;
    }
    .stat .label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .stat .value {
      font-size: 18px;
      font-weight: 700;
      word-break: break-word;
    }
    .expense-list {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }
    .expense-item {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: #fff;
    }
    .expense-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }
    .expense-title {
      font-weight: 700;
      margin-bottom: 6px;
    }
    .expense-meta {
      font-size: 13px;
      color: var(--muted);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .expense-amount {
      font-weight: 800;
      white-space: nowrap;
    }
    .row-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .small-btn {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 10px;
      padding: 8px 10px;
      cursor: pointer;
    }
    .empty {
      color: var(--muted);
      font-size: 14px;
      padding: 10px 0 4px;
    }
    .section-note {
      font-size: 13px;
      color: var(--muted);
      margin-top: -4px;
      margin-bottom: 12px;
    }
    .month-cats {
      display: grid;
      gap: 8px;
    }
    .cat-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
    }
    .cat-row:last-child { border-bottom: 0; }
    .editing-banner {
      display: none;
      margin-bottom: 10px;
      background: #eef2ff;
      color: #3730a3;
      border: 1px solid #c7d2fe;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 14px;
    }
    @media (max-width: 640px) {
      .grid-2, .stats {
        grid-template-columns: 1fr;
      }
      .expense-top {
        flex-direction: column;
      }
      .expense-amount {
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>매일 지출 기록</h1>

    <section class="card">
      <div class="editing-banner" id="editingBanner">수정 중입니다. 내용을 바꾼 뒤 ‘수정 완료’를 누르세요.</div>
      <h2>지출 입력</h2>
      <div class="grid grid-2">
        <div>
          <label for="amount">금액</label>
          <input id="amount" type="number" inputmode="numeric" placeholder="예: 12000" />
        </div>
        <div>
          <label for="date">날짜</label>
          <input id="date" type="date" />
        </div>
      </div>

      <div style="margin-top: 12px;">
        <label>구분</label>
        <div class="chips" id="ownerChips"></div>
      </div>

      <div style="margin-top: 12px;">
        <label>카테고리</label>
        <div class="chips" id="categoryChips"></div>
      </div>

      <div style="margin-top: 12px;">
        <label for="memo">메모</label>
        <textarea id="memo" placeholder="예: 점심, 마트, 주차비"></textarea>
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="saveBtn">저장</button>
        <button class="btn btn-secondary" id="cancelBtn" type="button" style="display:none;">수정 취소</button>
      </div>
    </section>

    <section class="card">
      <h2>오늘 요약</h2>
      <div class="stats" id="todayStats"></div>
    </section>

    <section class="card">
      <h2>이번 달 요약</h2>
      <div class="stats" id="monthStats"></div>
    </section>

    <section class="card">
      <h2>이번 달 카테고리 합계</h2>
      <div class="section-note">이번 달에 기록된 내역 기준입니다.</div>
      <div class="month-cats" id="categoryTotals"></div>
    </section>

    <section class="card">
      <h2>기록 목록</h2>
      <div class="section-note">수정하려면 ‘수정’을 누르세요.</div>
      <div class="expense-list" id="expenseList"></div>
    </section>
  </div>

  <script>
    const STORAGE_KEY = 'expense_tracker_owner_v2';
    const owners = ['개인', '가족'];
    const categories = ['식비', '카페', '교통', '쇼핑', '생활', '기타'];

    const amountEl = document.getElementById('amount');
    const dateEl = document.getElementById('date');
    const memoEl = document.getElementById('memo');
    const saveBtn = document.getElementById('saveBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const expenseListEl = document.getElementById('expenseList');
    const todayStatsEl = document.getElementById('todayStats');
    const monthStatsEl = document.getElementById('monthStats');
    const categoryTotalsEl = document.getElementById('categoryTotals');
    const ownerChipsEl = document.getElementById('ownerChips');
    const categoryChipsEl = document.getElementById('categoryChips');
    const editingBannerEl = document.getElementById('editingBanner');

    let selectedOwner = '개인';
    let selectedCategory = '식비';
    let editingId = null;
    let expenses = loadExpenses();

    function todayString() {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, '0');
      const d = String(now.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function loadExpenses() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveExpenses() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(expenses));
    }

    function formatMoney(value) {
      return `${Number(value || 0).toLocaleString('ko-KR')}원`;
    }

    function createChips(container, items, selectedValue, onClick) {
      container.innerHTML = '';
      items.forEach(item => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = `chip ${item === selectedValue ? 'active' : ''}`;
        btn.textContent = item;
        btn.addEventListener('click', () => onClick(item));
        container.appendChild(btn);
      });
    }

    function renderChipGroups() {
      createChips(ownerChipsEl, owners, selectedOwner, (value) => {
        selectedOwner = value;
        renderChipGroups();
      });
      createChips(categoryChipsEl, categories, selectedCategory, (value) => {
        selectedCategory = value;
        renderChipGroups();
      });
    }

    function resetForm() {
      amountEl.value = '';
      memoEl.value = '';
      dateEl.value = todayString();
      selectedOwner = '개인';
      selectedCategory = '식비';
      editingId = null;
      saveBtn.textContent = '저장';
      cancelBtn.style.display = 'none';
      editingBannerEl.style.display = 'none';
      renderChipGroups();
    }

    function getTodayExpenses() {
      const today = todayString();
      return expenses.filter(item => item.date === today);
    }

    function getMonthExpenses() {
      const now = new Date();
      const ym = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
      return expenses.filter(item => String(item.date || '').startsWith(ym));
    }

    function sumBy(items, predicate = () => true) {
      return items.filter(predicate).reduce((sum, item) => sum + Number(item.amount || 0), 0);
    }

    function renderStats() {
      const todayItems = getTodayExpenses();
      const monthItems = getMonthExpenses();

      const todayStats = [
        { label: '오늘 총액', value: formatMoney(sumBy(todayItems)) },
        { label: '오늘 개인', value: formatMoney(sumBy(todayItems, i => i.owner === '개인')) },
        { label: '오늘 가족', value: formatMoney(sumBy(todayItems, i => i.owner === '가족')) },
      ];

      const monthStats = [
        { label: '이번 달 총액', value: formatMoney(sumBy(monthItems)) },
        { label: '이번 달 개인', value: formatMoney(sumBy(monthItems, i => i.owner === '개인')) },
        { label: '이번 달 가족', value: formatMoney(sumBy(monthItems, i => i.owner === '가족')) },
      ];

      todayStatsEl.innerHTML = todayStats.map(stat => `
        <div class="stat">
          <div class="label">${stat.label}</div>
          <div class="value">${stat.value}</div>
        </div>
      `).join('');

      monthStatsEl.innerHTML = monthStats.map(stat => `
        <div class="stat">
          <div class="label">${stat.label}</div>
          <div class="value">${stat.value}</div>
        </div>
      `).join('');
    }

    function renderCategoryTotals() {
      const monthItems = getMonthExpenses();
      const totals = categories.map(category => ({
        category,
        total: sumBy(monthItems, item => item.category === category)
      })).filter(item => item.total > 0);

      if (!totals.length) {
        categoryTotalsEl.innerHTML = '<div class="empty">이번 달 기록이 아직 없습니다.</div>';
        return;
      }

      categoryTotalsEl.innerHTML = totals.map(item => `
        <div class="cat-row">
          <span>${item.category}</span>
          <strong>${formatMoney(item.total)}</strong>
        </div>
      `).join('');
    }

    function sortExpenses(items) {
      return [...items].sort((a, b) => {
        if (a.date !== b.date) return a.date < b.date ? 1 : -1;
        return b.id - a.id;
      });
    }

    function renderExpenseList() {
      const sorted = sortExpenses(expenses);
      if (!sorted.length) {
        expenseListEl.innerHTML = '<div class="empty">아직 저장된 기록이 없습니다.</div>';
        return;
      }

      expenseListEl.innerHTML = sorted.map(item => `
        <div class="expense-item">
          <div class="expense-top">
            <div>
              <div class="expense-title">${escapeHtml(item.memo || item.category)}</div>
              <div class="expense-meta">
                <span>${item.date}</span>
                <span>${item.category}</span>
                <span>${item.owner}</span>
              </div>
            </div>
            <div class="expense-amount">${formatMoney(item.amount)}</div>
          </div>
          <div class="row-actions">
            <button class="small-btn" type="button" onclick="startEdit(${item.id})">수정</button>
            <button class="small-btn" type="button" onclick="deleteExpense(${item.id})">삭제</button>
          </div>
        </div>
      `).join('');
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function render() {
      renderChipGroups();
      renderStats();
      renderCategoryTotals();
      renderExpenseList();
    }

    function validateForm() {
      const amount = Number(amountEl.value);
      if (!amount || amount <= 0) {
        alert('금액을 입력하세요.');
        amountEl.focus();
        return false;
      }
      if (!dateEl.value) {
        alert('날짜를 선택하세요.');
        dateEl.focus();
        return false;
      }
      return true;
    }

    function upsertExpense() {
      if (!validateForm()) return;

      const payload = {
        id: editingId ?? Date.now(),
        amount: Number(amountEl.value),
        category: selectedCategory,
        owner: selectedOwner,
        memo: memoEl.value.trim(),
        date: dateEl.value,
      };

      if (editingId !== null) {
        expenses = expenses.map(item => item.id === editingId ? payload : item);
      } else {
        expenses.push(payload);
      }

      saveExpenses();
      resetForm();
      render();
    }

    window.startEdit = function(id) {
      const item = expenses.find(expense => expense.id === id);
      if (!item) return;

      editingId = id;
      amountEl.value = item.amount;
      dateEl.value = item.date;
      memoEl.value = item.memo || '';
      selectedOwner = item.owner || '개인';
      selectedCategory = item.category || '식비';
      saveBtn.textContent = '수정 완료';
      cancelBtn.style.display = 'inline-block';
      editingBannerEl.style.display = 'block';
      renderChipGroups();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    window.deleteExpense = function(id) {
      const ok = confirm('이 기록을 삭제하시겠습니까?');
      if (!ok) return;
      expenses = expenses.filter(item => item.id !== id);
      if (editingId === id) resetForm();
      saveExpenses();
      render();
    }

    saveBtn.addEventListener('click', upsertExpense);
    cancelBtn.addEventListener('click', resetForm);

    dateEl.value = todayString();
    resetForm();
    render();
  </script>
</body>
</html>
